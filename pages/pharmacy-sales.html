<!-- أزرار العمليات -->

<div class="actions">

    <button class="btn import">
        💾 حفظ الفاتورة
    </button>

    <button class="btn pdf">
        ❌ إلغاء
    </button>

<script>

const btn = document.getElementById("tableViewBtn");
const menu = document.getElementById("tableViewMenu");

btn.onclick = function(e){
    e.stopPropagation();
    menu.classList.toggle("show");
};

document.addEventListener("click", function(e){
    if(!menu.contains(e.target) && e.target !== btn){
        menu.classList.remove("show");
    }
});

menu.addEventListener("click", function(e){
    e.stopPropagation();
});

// =========================
// حفظ طريقة العرض
// =========================

const saveBtn = document.querySelector(".save-view");

saveBtn.addEventListener("click", () => {

    const settings = [];

    document
        .querySelectorAll("#tableViewMenu input[type='checkbox']")
        .forEach((box) => {

            settings.push({
                column: box.dataset.column,
                checked: box.checked
            });

        });

    settings.forEach(item => {

        const field = document.querySelector(
            '.field[data-field="' + item.column + '"]'
        );

        if (!field) return;

        field.style.display = item.checked ? "" : "none";

    });

    localStorage.setItem(
        "salesInvoiceTableView",
        JSON.stringify(settings)
    );

    alert("تم حفظ طريقة العرض بنجاح");

    menu.classList.remove("show");

});

// =========================
// استرجاع طريقة العرض
// =========================

window.addEventListener("DOMContentLoaded", () => {

    const saved = JSON.parse(
        localStorage.getItem("salesInvoiceTableView")
    );

    if (!saved) return;

    const boxes = document.querySelectorAll(
        "#tableViewMenu input[type='checkbox']"
    );

    saved.forEach((item) => {

        boxes.forEach((box) => {

            if (box.dataset.column === item.column) {

                box.checked = item.checked;

                const field = document.querySelector(
                    '.field[data-field="' + item.column + '"]'
                );

                if (field) {
                    field.style.display = item.checked ? "" : "none";
                }

            }

        });

    });

});
// =========================
// قائمة طريقة عرض الفاتورة
// =========================

const invoiceBtn = document.getElementById("invoiceTableViewBtn");
const invoiceMenu = document.getElementById("invoiceTableViewMenu");

invoiceBtn.onclick = function(e){
    e.stopPropagation();
    invoiceMenu.classList.toggle("show");
};

document.addEventListener("click", function(e){
    if(!invoiceMenu.contains(e.target) && e.target !== invoiceBtn){
        invoiceMenu.classList.remove("show");
    }
});

invoiceMenu.addEventListener("click", function(e){
    e.stopPropagation();
});

const saveInvoiceBtn = document.querySelector(".save-invoice-table-view");

saveInvoiceBtn.addEventListener("click", () => {

    const settings = [];

    document
        .querySelectorAll("#invoiceTableViewMenu input[type='checkbox']")
        .forEach(box => {

            settings.push({
                column: box.dataset.column,
                checked: box.checked
            });

        });

    const table = document.getElementById("invoiceProductsTable");

    settings.forEach(item => {

        table.querySelectorAll("tr").forEach(row => {

            const cell = row.querySelectorAll("th,td")[item.column];

            if(cell){
                cell.style.display = item.checked ? "" : "none";
            }

        });

    });

    localStorage.setItem(
        "salesInvoiceProductsView",
        JSON.stringify(settings)
    );

    alert("تم حفظ طريقة العرض بنجاح");

    invoiceMenu.classList.remove("show");

});

window.addEventListener("DOMContentLoaded", () => {

    const saved = JSON.parse(
        localStorage.getItem("salesInvoiceProductsView")
    );

    if(!saved) return;

    document
        .querySelectorAll("#invoiceTableViewMenu input[type='checkbox']")
        .forEach(box => {

            const item = saved.find(x => x.column === box.dataset.column);

            if(item){
                box.checked = item.checked;
            }

        });

    const table = document.getElementById("invoiceProductsTable");

    saved.forEach(item => {

        table.querySelectorAll("tr").forEach(row => {

            const cell = row.querySelectorAll("th,td")[item.column];

            if(cell){
                cell.style.display = item.checked ? "" : "none";
            }

        });

    });

});
</script>
